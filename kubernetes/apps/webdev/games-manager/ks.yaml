---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: games-manager
spec:
  dependsOn:
    - name: cloudnative-pg
      namespace: database
    - name: authelia
      namespace: default
  interval: 1h
  path: ./kubernetes/apps/webdev/games-manager/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: webdev
  wait: false