---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
spec:
  chartRef:
    kind: OCIRepository
    name: home-assistant
  interval: 1h
  values:
    controllers:
      home-assistant:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
            k8s.v1.cni.cncf.io/networks: |
              [{
                "name":"iot",
                "namespace": "kube-system",
                "mac": "f2:f9:00:00:20:02",
                "ips": ["10.10.20.240/24"]
              },
              {
                "name": "not",
                "namespace": "kube-system",
                "mac": "f2:f9:00:00:30:02",
                "ips": ["10.10.30.240/24"]
              },
              {
                "name": "media",
                "namespace": "kube-system",
                "mac": "f2:f9:00:00:40:02",
                "ips": ["10.10.40.240/24"]
              }]
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
            envFrom:
              - secretRef:
                  name: home-assistant-secret
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.5.3@sha256:05dc008c0bad203ee4e0845a298e0fbbbdb7a6fedab912af782746e238b1e04a
            env:
              TZ: ${TIMEZONE}
            envFrom:
              - secretRef:
                  name: home-assistant-secret
            securityContext:
              # allowPrivilegeEscalation: false
              # readOnlyRootFilesystem: true
              capabilities:
                {
                  # drop: ["ALL"],
                  add: ["NET_ADMIN", "NET_RAW", "NET_BROADCAST", "NET_BIND_SERVICE"],
                }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 2Gi
          matter-hub:
            image:
              repository: ghcr.io/riddix/home-assistant-matter-hub
              tag: 2.0.45@sha256:9b0ba82a982a8204156952be235610a6fdad20f1775904828d6a878a8f5a88ed
            env:
              HAMH_STORAGE_LOCATION: /config/matter-hub
              HAMH_HOME_ASSISTANT_URL: http://localhost:8123/
              HAMH_LOG_LEVEL: info
              HAMH_HTTP_PORT: "8482"
            envFrom:
              - secretRef:
                  name: home-assistant-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
          code-server:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.118.0@sha256:4aff9947c113487113201da811564fade1af5f23038b4d683998d024eebbac92
            args:
              - --auth
              - none
              - --disable-telemetry
              - --disable-update-check
              - --user-data-dir
              - /config/.code-server
              - --extensions-dir
              - /config/.code-server
              - --port
              - "12321"
              - /config
            env:
              HASS_SERVER: http://localhost:8123
              HASS_TOKEN:
                secretKeyRef:
                  name: home-assistant-secret
                  key: HASS_TOKEN
            resources:
              requests:
                cpu: 5m
              limits:
                memory: 512Mi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      # hostNetwork: true
    service:
      app:
        primary: true
        type: LoadBalancer
        sessionAffinity: ClientIP
        annotations:
          lbipam.cilium.io/ips: 10.10.69.240
        ports:
          http:
            port: 8123
      matter-hub:
        ports:
          http:
            port: 8482
      code-server:
        ports:
          code-server:
            port: 12321
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == any(200,401)"]
        hostnames:
          - home.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 8123

      code: # The resulting HTTPRoute will be named home-assistant-code
        enabled: true
        hostnames:
          - home.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /code/
            filters:
              - type: URLRewrite
                urlRewrite:
                  path:
                    type: ReplacePrefixMatch
                    replacePrefixMatch: /
            backendRefs:
              - identifier: code-server
                port: 12321
          - matches:
              - path:
                  type: PathPrefix
                  value: /matter/
            filters:
              - type: URLRewrite
                urlRewrite:
                  path:
                    type: ReplacePrefixMatch
                    replacePrefixMatch: /
              - type: RequestHeaderModifier
                requestHeaderModifier:
                  add:
                    - name: "x-ingress-path"
                      value: "matter"
            backendRefs:
              - identifier: matter-hub
                port: 8482

    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          home-assistant:
            app:
              - path: /config
            code-server:
              - path: /config
            matter-hub:
              - path: /config
      config-cache:
        existingClaim: "{{ .Release.Name }}-cache"
        globalMounts:
          - path: /config/.venv
      tmpfs:
        type: emptyDir
        advancedMounts:
          home-assistant:
            app:
              - path: /config/logs
                subPath: logs
              - path: /config/tts
                subPath: tts
              - path: /tmp
                subPath: tmp
            code-server:
              - path: /tmp
                subPath: code-server-tmp
              - path: /nonexistent
                subPath: nonexistent





