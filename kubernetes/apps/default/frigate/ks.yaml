---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app frigate
spec:
  components:
    - ../../../../components/gpu
    - ../../../../components/volsync
    - ../../../../components/ext-auth
    - ../../../../components/zeroscaler
  dependsOn:
    - name: keda
      namespace: o11y
    - name: csi-driver-nfs
      namespace: kube-system
    - name: mosquitto
    - name: intel-gpu-resource-driver
      namespace: kube-system
    - name: volsync
      namespace: volsync-system
  interval: 30m
  path: ./kubernetes/apps/default/frigate/app
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 15Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  wait: false