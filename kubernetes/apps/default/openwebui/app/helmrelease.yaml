---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app openwebui
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: openwebui
  values:
    controllers:
      openwebui:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: v0.10.2
            env:
              WEBUI_URL: https://ai.f9.casa
              OPENAI_API_BASE_URL: "http://nas.main.internal:8080/v1"
              OPENAI_API_CONFIGS: '{"0": {"enable": true, "tags": [], "prefix_id": "", "model_ids": [], "connection_type": "external", "auth_type": "none", "provider": "llama.cpp"}}'
              OAUTH_PROVIDER_NAME: "Home"
              OPENID_PROVIDER_URL: "https://auth.f9.casa/.well-known/openid-configuration"
              TZ: "Europe/London"
              ENABLE_OAUTH_SIGNUP: "true"
              OAUTH_MERGE_ACCOUNTS_BY_EMAIL: "true"
              OAUTH_SCOPES: "openid email profile groups"
              ENABLE_OAUTH_ROLE_MANAGEMENT: "true"
              OAUTH_ALLOWED_ROLES: openwebui,openwebui-admin,admin
              OAUTH_ADMIN_ROLES: openwebui-admin,admin
              OAUTH_ROLES_CLAIM: groups
              ENABLE_LOGIN_FORM: "false"
              DEFAULT_USER_ROLE: "user"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            resources:
              limits:
                memory: 2Gi
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: false
    service:
      app:
        ports:
          http:
            port: &port 8080

    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == any(200,401)"]
        hostnames: ["ai.f9.casa"]
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - backendRefs:
              - name: *app
                port: *port

    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/backend/data