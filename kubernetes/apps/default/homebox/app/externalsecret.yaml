---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homebox
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: homebox-secret
    template:
      data:

        # Homebox auth (required >= 0.26.0; >=32 bytes, openssl rand -base64 48).
        # Rotating this invalidates all issued homebox API keys.
        HBOX_AUTH_API_KEY_PEPPER: "{{ .HBOX_AUTH_API_KEY_PEPPER }}"

        HBOX_DATABASE_DATABASE: &dbname homebox
        HBOX_DATABASE_HOST: &dbhost "postgres-rw.database.svc.cluster.local"
        HBOX_DATABASE_PASSWORD: &dbpass "{{ .HBOX_DATABASE_PASSWORD }}"
        HBOX_DATABASE_PORT: "5432"
        HBOX_DATABASE_USERNAME: &dbuser homebox
        HBOX_OIDC_ISSUER_URL: "https://auth.f9.casa"
        HBOX_OIDC_CLIENT_ID: "{{ .HOMEBOX_OAUTH_CLIENT_ID }}"
        HBOX_OIDC_CLIENT_SECRET: "{{ .HOMEBOX_OAUTH_CLIENT_SECRET }}"

        # Postgres Init
        INIT_POSTGRES_DBNAME: *dbname
        INIT_POSTGRES_HOST: *dbhost
        INIT_POSTGRES_PASS: *dbpass
        INIT_POSTGRES_USER: *dbuser
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: homebox
    - extract:
        key: cloudnative-pg
    - extract:
        key: authelia
