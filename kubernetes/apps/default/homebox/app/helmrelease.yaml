---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homebox
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: homebox
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      homebox:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
            envFrom: &envFrom
              - secretRef:
                  name: homebox-secret
        containers:
          homebox:
            image:
              repository: ghcr.io/sysadminsmedia/homebox
              tag: 0.26.1@sha256:17d82459c12a6592b056d9319d3bc8dc46a2a0272062b433cd6ced4aa7155de7
            env:
              HBOX_OPTIONS_CHECK_GITHUB_RELEASE: "false"
              HBOX_DATABASE_DRIVER: postgres
              HBOX_DATABASE_SSL_MODE: disable
              HBOX_LOG_FORMAT: json
              HBOX_LOG_LEVEL: info
              HBOX_WEB_PORT: &port 7745
              HBOX_OIDC_ENABLED: "true"
              HBOX_OPTIONS_TRUST_PROXY: "true"
              HBOX_OIDC_SCOPE: "openid profile email groups"
              HBOX_OIDC_ALLOWED_GROUPS: "admin,home"
              HBOX_OIDC_AUTO_REDIRECT: "true"
              HBOX_OPTIONS_ALLOW_LOCAL_LOGIN: "false"
              TZ: Europe/London
            envFrom: *envFrom
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
      modcache:
        type: emptyDir
        sizeLimit: 100Mi
        globalMounts:
          - path: /.cache
    route:
      homebox:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == any(200,401)"]
        hostnames:
          - "{{ .Release.Name }}.f9.casa"
          - "inventory.f9.casa"
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - backendRefs:
              - port: *port
                name: homebox
    service:
      homebox:
        controller: homebox
        type: ClusterIP
        ports:
          http:
            port: *port
