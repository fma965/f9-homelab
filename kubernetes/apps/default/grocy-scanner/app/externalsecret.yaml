---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grocy-scanner
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: grocy-scanner-secret
    template:
      data:
        Grocy__ApiKey: "{{ .GROCY_SCANNER_API_KEY }}"
  dataFrom:
    - extract:
        key: grocy