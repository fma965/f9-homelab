---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: forgejo
  values:
    controllers:
      forgejo:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
            envFrom: &envFrom
              - secretRef:
                  name: forgejo-secret

        containers:
          app:
            image:
              repository: codeberg.org/forgejo/forgejo
              pullPolicy: IfNotPresent
              tag: 16.0.1-rootless@sha256:71863f6b6c5837a27b3a2d133c3161c78a432aa878d57798d74b1d917ff842be
            env:
              TZ: Europe/London
              USER_UID: 1000
              USER_GID: 1000
            envFrom: *envFrom
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: 3000
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == any(200,401)"]
        hostnames:
          - "{{ .Release.Name }}.f9.casa"
          - "git.f9.casa"
        parentRefs:
          - name: envoy-external
            namespace: network

    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          forgejo:
            app:
            - path: /etc/gitea
              subPath: gitea-config # Directory within the PVC for config files
            - path: /data/gitea
              subPath: gitea-data # Directory within the PVC for data files
            - path: /var/lib/gitea/git
              subPath: gitea-lfs # Directory within the PVC for git repositories
      data:
        type: nfs
        server: nas.main.internal
        path: /mnt/Data/Forgejo
        globalMounts:
          - path: /var/lib/gitea/git/repositories
        enabled: true