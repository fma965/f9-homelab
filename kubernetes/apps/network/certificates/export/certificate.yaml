---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ${SECRET_EXTERNAL_DOMAIN//./-}
spec:
  dnsNames:
      - ${SECRET_DOMAIN}
      - "*.${SECRET_DOMAIN}"
      - "*.s3.${SECRET_DOMAIN}"
  duration: 160h
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  secretName: ${SECRET_EXTERNAL_DOMAIN//./-}-tls
  usages:
    - digital signature